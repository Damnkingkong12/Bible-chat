<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Friend in Christ — Bible Companion</title>
<meta name="description" content="Ask anything about the Bible. A warm, friendly companion for scripture questions and daily encouragement." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FAF6EE;
    --paper-deep: #F2EBDC;
    --ink: #2A2019;
    --ink-soft: #6B5D4F;
    --wine: #722F37;
    --wine-deep: #5C242B;
    --gold: #A8842C;
    --line: #E4D9C3;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Karla", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ---------- Header ---------- */
  header {
    padding: calc(14px + env(safe-area-inset-top)) 20px 14px;
    text-align: center;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  header h1 {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 1.55rem;
    letter-spacing: 0.01em;
    color: var(--wine);
  }

  .rule {
    width: 130px;
    margin: 8px auto 0;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--gold);
  }
  .rule::before, .rule::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(to var(--dir, right), transparent, var(--gold));
  }
  .rule::before { --dir: right; }
  .rule::after  { --dir: left; }
  .rule span { font-size: 0.8rem; line-height: 1; transform: translateY(-1px); }

  header p {
    margin-top: 7px;
    font-size: 0.8rem;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* ---------- Chat area ---------- */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 22px 16px 10px;
    scroll-behavior: smooth;
  }

  .thread {
    max-width: 660px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: rise 0.25s ease both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .msg { animation: none; }
    main { scroll-behavior: auto; }
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--wine);
    color: var(--paper);
    font-family: "Cormorant Garamond", serif;
    font-size: 1.15rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 1.5px var(--gold);
  }

  .bubble {
    max-width: 82%;
    padding: 12px 15px;
    border-radius: var(--radius);
    font-size: 0.96rem;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }

  .msg.agent .bubble {
    background: #FFFDF7;
    border: 1px solid var(--line);
    border-bottom-left-radius: 6px;
    box-shadow: 0 1px 2px rgba(42, 32, 25, 0.05);
  }

  .msg.user {
    flex-direction: row-reverse;
  }
  .msg.user .bubble {
    background: var(--wine);
    color: #FBF3EC;
    border-bottom-right-radius: 6px;
  }

  /* Signature: scripture references set in gold small-caps */
  .verse {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 600;
    color: var(--gold);
    white-space: nowrap;
  }
  .msg.user .verse { color: #E9C87C; }

  /* Typing indicator */
  .dots {
    display: inline-flex;
    gap: 5px;
    padding: 6px 2px;
  }
  .dots i {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: blink 1.2s infinite ease-in-out;
  }
  .dots i:nth-child(2) { animation-delay: 0.15s; }
  .dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blink {
    0%, 70%, 100% { opacity: 0.25; }
    35% { opacity: 1; }
  }

  .error-note {
    text-align: center;
    font-size: 0.82rem;
    color: var(--wine);
    background: #F7E8E4;
    border: 1px solid #EAD0C9;
    border-radius: 10px;
    padding: 8px 14px;
    margin: 0 auto;
    max-width: 480px;
  }

  /* ---------- Composer ---------- */
  footer {
    flex-shrink: 0;
    padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
    background: var(--paper);
    border-top: 1px solid var(--line);
  }

  .composer {
    max-width: 660px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #FFFDF7;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.15s ease;
  }
  .composer:focus-within { border-color: var(--gold); }

  textarea {
    flex: 1;
    border: none;
    background: transparent;
    resize: none;
    font-family: inherit;
    font-size: 0.98rem;
    line-height: 1.45;
    color: var(--ink);
    max-height: 120px;
    outline: none;
  }
  textarea::placeholder { color: #A79781; }

  button.send {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: var(--wine);
    color: #FBF3EC;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button.send:hover { background: var(--wine-deep); }
  button.send:active { transform: scale(0.94); }
  button.send:disabled { background: #C9B99E; cursor: default; }
  button.send:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  button.send svg { width: 18px; height: 18px; }

  .footnote {
    text-align: center;
    font-size: 0.7rem;
    color: #A79781;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<header>
  <h1>Friend in Christ</h1>
  <div class="rule"><span>✝</span></div>
  <p>A companion for your Bible questions</p>
</header>

<main>
  <div class="thread" id="thread" aria-live="polite"></div>
</main>

<footer>
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Ask about a verse, a story, a question of faith…" aria-label="Your message"></textarea>
    <button class="send" id="send" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
  <p class="footnote">Answers are AI-generated — always test them against Scripture itself.</p>
</footer>

<script>
  const thread = document.getElementById("thread");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");

  // Conversation history kept in memory (sent with each request for context)
  const history = [];
  let busy = false;

  // Signature touch: render scripture references (e.g. John 3:16, 1 Corinthians 13:4-7) in gold
  const BOOKS = "(?:Genesis|Exodus|Leviticus|Numbers|Deuteronomy|Joshua|Judges|Ruth|(?:1|2)\\s?Samuel|(?:1|2)\\s?Kings|(?:1|2)\\s?Chronicles|Ezra|Nehemiah|Esther|Job|Psalms?|Proverbs|Ecclesiastes|Song of Solomon|Isaiah|Jeremiah|Lamentations|Ezekiel|Daniel|Hosea|Joel|Amos|Obadiah|Jonah|Micah|Nahum|Habakkuk|Zephaniah|Haggai|Zechariah|Malachi|Matthew|Mark|Luke|John|Acts|Romans|(?:1|2)\\s?Corinthians|Galatians|Ephesians|Philippians|Colossians|(?:1|2)\\s?Thessalonians|(?:1|2)\\s?Timothy|Titus|Philemon|Hebrews|James|(?:1|2)\\s?Peter|(?:1|2|3)\\s?John|Jude|Revelation)";
  const VERSE_RE = new RegExp("\\b(" + BOOKS + "\\s\\d{1,3}(?::\\d{1,3}(?:[-–]\\d{1,3})?)?)", "g");

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function renderContent(text) {
    return escapeHtml(text).replace(VERSE_RE, '<span class="verse">$1</span>');
  }

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = "msg " + (role === "user" ? "user" : "agent");
    if (role !== "user") {
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = "✝";
      row.appendChild(av);
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = renderContent(text);
    row.appendChild(bubble);
    thread.appendChild(row);
    scrollDown();
    return bubble;
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "msg agent";
    row.id = "typing";
    row.innerHTML = '<div class="avatar">✝</div><div class="bubble"><span class="dots"><i></i><i></i><i></i></span></div>';
    thread.appendChild(row);
    scrollDown();
  }

  function removeTyping() {
    document.getElementById("typing")?.remove();
  }

  function showError(text) {
    const el = document.createElement("div");
    el.className = "error-note";
    el.textContent = text;
    thread.appendChild(el);
    scrollDown();
  }

  function scrollDown() {
    requestAnimationFrame(() => {
      thread.parentElement.scrollTop = thread.parentElement.scrollHeight;
    });
  }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;

    input.value = "";
    autosize();
    addMessage("user", text);
    history.push({ role: "user", content: text });

    busy = true;
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json().catch(() => ({}));
      removeTyping();

      if (!res.ok || !data.reply) {
        showError(data.error || "Something went wrong. Please try again.");
        history.pop(); // let them resend the same question
      } else {
        history.push({ role: "assistant", content: data.reply });
        addMessage("assistant", data.reply);
      }
    } catch {
      removeTyping();
      showError("Couldn't reach the server. Check your connection and try again.");
      history.pop();
    } finally {
      busy = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function autosize() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("input", autosize);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Warm opening line (no API call needed)
  addMessage(
    "assistant",
    "Hello, this is your friend in Christ. I can help with your Bible questions — is there a verse, story, or matter of faith on your heart today?"
  );
</script>
</body>
</html>
